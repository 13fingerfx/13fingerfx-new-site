<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>13 Finger FX | Practical FX Studio</title>
    <meta name="description" content="13 Finger FX is a London practical effects studio specialising in prosthetics, creatures, puppets, gags, props and stunt effects.">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="home-page">
    <header class="site-header">
      <a class="brand" href="/" aria-label="13 Finger FX home">
        <img src="/assets/ffx-logo-white.png" alt="13 Finger FX">
      </a>
      <button class="nav-toggle" type="button" aria-controls="site-nav" aria-expanded="false">Menu</button>
      <nav class="site-nav" id="site-nav" aria-label="Primary navigation">
        <a href="/" aria-current="page">Home</a>
        <a href="/info/">About</a>
        <a href="/contact/">Contact</a>
        <a href="/apply/">Crew Form</a>
      </nav>
    </header>

    <main>
      <section class="home-video" aria-labelledby="home-title">
        <video class="home-video__media home-video__media--desktop" autoplay muted loop playsinline poster="/assets/video/home-desktop-poster.jpg">
          <source src="/assets/video/home-desktop.mp4" type="video/mp4">
        </video>
        <video class="home-video__media home-video__media--mobile" autoplay muted loop playsinline poster="/assets/video/home-mobile-poster.jpg">
          <source src="/assets/video/home-mobile.mp4" type="video/mp4">
        </video>
        <div class="home-video__overlay">
          <p class="studio-line">Practical<br>FX Studio</p>
          <h1 id="home-title">Special makeup effects / creatures / custom props</h1>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div>
        <strong>13FFX</strong>
        <span>Practical FX Studio</span>
      </div>
      <address>Unit 7, Metro Business Centre, Kangley Bridge Rd, London, SE26 5BW, UK</address>
      <p>&copy; 2025 13 Finger FX</p>
    </footer>

    <script src="/script.js"></script>
  </body>
</html>

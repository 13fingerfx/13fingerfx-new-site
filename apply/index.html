<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Crew Form | 13 Finger FX</title>
    <meta name="description" content="Contact 13FingerFX if you are an artist hoping to work with an international, award winning, London based practical FX studio.">
    <meta name="keywords" content="13 Finger FX crew, practical effects artist London, prosthetic makeup artist UK, creature effects artist, CFX artist, film prosthetics crew, practical FX Europe, Dan Martin prosthetics">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/" aria-label="13 Finger FX home">
        <img src="/assets/ffx-logo-white.png" alt="13 Finger FX">
      </a>
      <button class="nav-toggle" type="button" aria-controls="site-nav" aria-expanded="false">Menu</button>
      <nav class="site-nav" id="site-nav" aria-label="Primary navigation">
        <a href="/">Home</a>
        <a href="/info/">About</a>
        <a href="/contact/">Contact</a>
        <a href="/apply/" aria-current="page">Crew Form</a>
      </nav>
    </header>

    <main>
      <section class="page-intro form-intro">
        <p class="studio-line">Crew Form</p>
      </section>

      <section class="form-section">
        <form class="form-panel wide-form" name="crew-application" method="POST" data-netlify="true" netlify-honeypot="bot-field" action="/thanks/">
          <input type="hidden" name="form-name" value="crew-application">
          <p class="hidden-field">
            <label>Do not fill this in: <input name="bot-field"></label>
          </p>
          <label>Email <input type="email" name="email" autocomplete="email" required></label>
          <label>Text <textarea name="message" rows="7" required></textarea></label>
          <button type="submit">Submit</button>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <div>
        <strong>13FFX</strong>
        <span>Practical FX Studio</span>
      </div>
      <address>Unit 7, Metro Business Centre, Kangley Bridge Rd, London, SE26 5BW, UK</address>
      <div class="footer-actions">
        <a class="button-link" href="/contact/">Get In Touch</a>
        <span>WhatsApp coming soon</span>
      </div>
      <nav class="social-links" aria-label="Social links">
        <a href="https://www.imdb.com/name/nm2087361">IMDB</a>
        <a href="https://www.instagram.com/13fingerfx">Instagram</a>
        <a href="https://www.linkedin.com/in/dan-martin-b8385322">LinkedIn</a>
        <a href="https://bsky.app/profile/danmartin.bsky.social">Bluesky</a>
        <a href="https://www.youtube.com/@13fingerfx">YouTube</a>
      </nav>
      <p>&copy; 2026 13 Finger FX</p>
    </footer>

    <script src="/script.js"></script>
  </body>
</html>
